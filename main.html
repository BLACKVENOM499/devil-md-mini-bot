<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>AKINDU MINI BOT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a0a, #1a0033);
      font-family: 'Poppins', 'Arial', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Animated Gradient Background */
    body::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 0, 150, 0.1) 0%, transparent 50%);
      animation: rotate 20s linear infinite;
      z-index: 0;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    /* Main Box */
    .box {
      background: rgba(10, 10, 20, 0.8);
      backdrop-filter: blur(15px);
      border: 2px solid rgba(255, 105, 180, 0.5);
      border-radius: 30px;
      padding: 30px 20px;
      box-shadow: 
        0 0 30px rgba(255, 105, 180, 0.3),
        inset 0 0 20px rgba(255, 105, 180, 0.2);
      animation: float 6s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }

    /* Floating Animation */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    /* Glowing Border Animation */
    .box::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, 
        #ff69b4, #ff1493, #ff69b4, #ff1493, #ff69b4);
      border-radius: 32px;
      z-index: -1;
      animation: glowing 3s linear infinite;
      opacity: 0.5;
    }

    @keyframes glowing {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    /* Icon Animation */
    .icon-wrapper {
      text-align: center;
      margin-bottom: 20px;
    }

    .icon-wrapper i {
      font-size: 60px;
      color: #ff69b4;
      text-shadow: 
        0 0 20px #ff69b4,
        0 0 40px #ff1493,
        0 0 60px #ff69b4;
      animation: heartbeat 1.5s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* Headers */
    h3 {
      color: white;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      margin: 15px 0 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: linear-gradient(45deg, #ff69b4, #ff1493, #ff69b4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 2s ease-in-out infinite;
    }

    h6 {
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
      text-align: center;
      margin: 5px 0;
      letter-spacing: 1px;
    }

    .subtitle {
      color: #ff69b4;
      font-size: 16px;
      margin: 10px 0 20px;
      text-align: center;
      position: relative;
      display: inline-block;
      width: 100%;
    }

    .subtitle::before,
    .subtitle::after {
      content: '🤖';
      margin: 0 10px;
      opacity: 0.7;
    }

    /* Input Container */
    .input-container {
      display: flex;
      width: 100%;
      margin: 25px 0 15px;
      position: relative;
      background: linear-gradient(45deg, #ff69b4, #ff1493);
      padding: 3px;
      border-radius: 50px;
      animation: borderPulse 2s ease-in-out infinite;
    }

    @keyframes borderPulse {
      0%, 100% { box-shadow: 0 0 15px #ff69b4; }
      50% { box-shadow: 0 0 30px #ff1493; }
    }

    .input-container input {
      width: 70%;
      padding: 16px 20px;
      border: none;
      border-radius: 50px 0 0 50px;
      background: #1a1a2e;
      color: white;
      font-size: 16px;
      font-weight: bold;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-container input::placeholder {
      color: rgba(255, 255, 255, 0.5);
      font-weight: normal;
    }

    .input-container input:focus {
      background: #16213e;
      box-shadow: inset 0 0 10px rgba(255, 105, 180, 0.3);
    }

    .input-container button {
      width: 30%;
      border: none;
      border-radius: 0 50px 50px 0;
      background: linear-gradient(45deg, #ff69b4, #ff1493);
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
    }

    .input-container button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s ease;
    }

    .input-container button:hover::before {
      left: 100%;
    }

    .input-container button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #ff69b4;
    }

    /* Loading Animation */
    .loading-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      margin: 20px 0;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 5px solid rgba(255, 105, 180, 0.2);
      border-top: 5px solid #ff69b4;
      border-right: 5px solid #ff1493;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
      margin: 10px auto;
      box-shadow: 0 0 20px #ff69b4;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: #ff69b4;
      font-size: 18px;
      margin-top: 15px;
      animation: pulse 1.5s ease-in-out infinite;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .loading-dots {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .loading-dots span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff69b4;
      animation: dots 1.4s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes dots {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-20px); opacity: 1; }
    }

    /* Result Box */
    .result-box {
      margin-top: 25px;
      padding: 20px;
      background: rgba(26, 26, 46, 0.9);
      border-radius: 20px;
      border: 2px solid #ff69b4;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #copy {
      display: inline-block;
      padding: 15px 25px;
      background: linear-gradient(45deg, #ff69b4, #ff1493);
      color: white !important;
      border-radius: 50px;
      font-size: 24px !important;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
      margin: 10px 0;
      width: 100%;
      text-align: center;
    }

    #copy:hover {
      transform: scale(1.05) rotate(2deg);
      box-shadow: 0 0 40px #ff69b4;
    }

    #copy span {
      color: white !important;
      background: rgba(0, 0, 0, 0.3);
      padding: 5px 15px;
      border-radius: 30px;
      margin-left: 10px;
    }

    /* Copy Hint */
    .copy-hint {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      margin-top: 10px;
      animation: fadeInOut 2s ease-in-out infinite;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Floating Hearts */
    .heart {
      position: absolute;
      color: #ff69b4;
      font-size: 20px;
      animation: heartFloat 4s linear infinite;
      opacity: 0.3;
      z-index: 5;
    }

    @keyframes heartFloat {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0.3;
      }
      100% {
        transform: translateY(-100px) rotate(360deg);
        opacity: 0;
      }
    }

    /* Neon Dots Animation (Improved) */
    .neon-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .dot {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #ff69b4;
      border-radius: 50%;
      box-shadow: 
        0 0 10px #ff69b4,
        0 0 20px #ff1493;
      animation: floatDot 4s ease-in-out infinite;
    }

    @keyframes floatDot {
      0%, 100% {
        transform: translateY(0) scale(1);
        opacity: 0.5;
      }
      50% {
        transform: translateY(-30px) scale(1.5);
        opacity: 1;
      }
    }

    /* Message Styles */
    .error-message {
      color: #ff6b6b;
      font-size: 16px;
      text-align: center;
      margin: 15px 0;
      padding: 10px;
      background: rgba(255, 107, 107, 0.1);
      border-radius: 10px;
      border-left: 4px solid #ff6b6b;
    }

    .info-message {
      color: #ff69b4;
      font-size: 16px;
      text-align: center;
      margin: 15px 0;
      padding: 10px;
      background: rgba(255, 105, 180, 0.1);
      border-radius: 10px;
      border-left: 4px solid #ff69b4;
    }
  </style>
</head>
<body>
  <div class="neon-bg" id="dots"></div>

  <div class="container">
    <div class="box" id="box">
      <div class="icon-wrapper">
        <i class="fas fa-heart"></i>
      </div>
      
      <h3>AKINDU MINI</h3>
      <h6 class="subtitle">FREE BOT</h6>
      <h6>CREATED BY <span style="color: #ff69b4; font-weight: bold;">PROJECT X</span></h6>
      <h6 style="margin-top: 15px;">🔢 Enter your WhatsApp Number</h6>

      <div class="input-container">
        <input 
          placeholder="94760000000" 
          type="tel" 
          id="number"
          oninput="this.value = this.value.replace(/[^0-9]/g, '')"
        >
        <button id="submit">
          <i class="fas fa-arrow-right"></i>
        </button>
      </div>

      <div id="waiting-message" style="display: none;"></div>
      <main id="pair"></main>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    let a = document.getElementById("pair");
    let b = document.getElementById("submit");
    let c = document.getElementById("number");

    // Create floating hearts
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '🤖';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = 3 + Math.random() * 4 + 's';
      heart.style.fontSize = 10 + Math.random() * 20 + 'px';
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }

    setInterval(createHeart, 500);

    // Enhanced Copy function with animation
    async function Copy() {
      let text = document.getElementById("copy").innerText.replace('CODE: ', '').trim();
      
      try {
        await navigator.clipboard.writeText(text);
        let obj = document.getElementById("copy");
        obj.innerHTML = '✅ COPIED! <span>📋</span>';
        obj.style.background = 'linear-gradient(45deg, #00ff88, #00cc66)';
        
        setTimeout(() => {
          obj.innerHTML = `CODE: <span>${text}</span>`;
          obj.style.background = 'linear-gradient(45deg, #ff69b4, #ff1493)';
        }, 2000);
      } catch (err) {
        console.error('Copy failed:', err);
      }
    }

    // Loading animation
    function showLoading() {
      return `
        <div class="loading-wrapper">
          <div class="loading-spinner"></div>
          <div class="loading-text">Please Wait</div>
          <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      `;
    }

    b.addEventListener("click", async (e) => {
      e.preventDefault();
      
      if (!c.value) {
        a.innerHTML = '<div class="info-message"><i class="fas fa-info-circle"></i> Enter your WhatsApp number with Country Code</div>';
        return;
      }
      
      const number = c.value.replace(/[^0-9]/g, "");
      
      if (number.length < 11) {
        a.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Invalid Number! Please check again.</div>';
        return;
      }
      
      // Format number display
      c.type = "text";
      c.value = "+" + number;
      
      // Show loading animation
      a.innerHTML = showLoading();
      
      try {
        // Try multiple endpoints for reliability
        let data;
        try {
          let response = await axios.get(`/code?number=${number}`);
          data = response.data;
        } catch {
          try {
            let response = await axios.get(`/api/code?number=${number}`);
            data = response.data;
          } catch {
            let response = await axios.get(`/pair?number=${number}`);
            data = response.data;
          }
        }
        
        let code = data.code || "Service Unavailable";
        
        // Display result with animation
        setTimeout(() => {
          a.innerHTML = `
            <div class="result-box">
              <font id="copy" onclick="Copy()">
                CODE: <span>${code}</span>
              </font>
              <div class="copy-hint">
                <i class="fas fa-mouse-pointer"></i> Click to copy
              </div>
            </div>
          `;
        }, 1000);
        
      } catch (error) {
        console.error('Error:', error);
        a.innerHTML = `
          <div class="error-message">
            <i class="fas fa-exclamation-circle"></i> Service temporarily unavailable. Please try again.
          </div>
        `;
      }
    });

    // Enter key support
    c.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        b.click();
      }
    });

    // Enhanced dot animation
    const bg = document.getElementById("dots");
    for (let i = 0; i < 100; i++) {
      const dot = document.createElement("div");
      dot.classList.add("dot");
      dot.style.left = Math.random() * 100 + "vw";
      dot.style.top = Math.random() * 100 + "vh";
      dot.style.animationDelay = Math.random() * 5 + "s";
      dot.style.animationDuration = 3 + Math.random() * 4 + "s";
      bg.appendChild(dot);
    }

    // Auto refresh dots
    setInterval(() => {
      const dots = document.querySelectorAll('.dot');
      if (dots.length < 100) {
        const dot = document.createElement("div");
        dot.classList.add("dot");
        dot.style.left = Math.random() * 100 + "vw";
        dot.style.top = Math.random() * 100 + "vh";
        dot.style.animationDelay = "0s";
        dot.style.animationDuration = 3 + Math.random() * 4 + "s";
        bg.appendChild(dot);
        
        setTimeout(() => {
          dot.remove();
        }, 5000);
      }
    }, 1000);
  </script>
</body>
</html>
